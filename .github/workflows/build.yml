name: Build EXE

on:
  push:
    branches: [master]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build EXE
        run: |
          pyinstaller --onefile --icon=v2ray_auto_scanner.ico --name v2ray_auto_scanner src/main.py
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: v2ray_auto_scanner
          path: dist/v2ray_auto_scanner.exe